<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sign in — Software Engineer Concepts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="login-shell">
    <form class="login-card" id="loginForm" novalidate>
      <p class="kicker">Interview preparation</p>
      <h1>Sign in</h1>
      <p class="lede" style="margin-bottom: 0.5rem">Study bank and practice tests in one place.</p>

      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required autofocus />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <p class="error" id="error" role="alert"></p>
      <button type="submit">Continue</button>
      <p class="muted-note">Local demo login. Session lasts for this browser tab.</p>
    </form>
  </div>
  <script src="js/auth.js"></script>
  <script>
    if (isAuthenticated()) location.replace("hub.html");

    document.getElementById("loginForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const error = document.getElementById("error");
      if (!login(username, password)) {
        error.textContent = "Invalid username or password.";
        return;
      }
      const params = new URLSearchParams(location.search);
      const next = params.get("next") || "hub.html";
      const safe = /^[a-z0-9.-]+\.html$/i.test(next) ? next : "hub.html";
      location.replace(safe);
    });
  </script>
</body>
</html>
